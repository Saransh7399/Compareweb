<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Sign-In</title>
	<link rel="stylesheet" href="./style.css">
</head>
<body class="page2">
	<form id= signinform>
		<h1 style="text-align: center;"><u>Login/Sign-Up</u></h1>
	    <p style="text-align: center; font-size: 15px">Please fill in this form to create an account</p>
	    <hr>

	    <label for="email"><b>Email</b></label><br>
	    <input type="text" placeholder="Enter Email" name="email" id="input" required><br><br>

	    <label for="psw"><b>Password</b></label><br>
	    <input type="password" placeholder="Enter Password" name="psw" required id="input" required><br><br>

	    <!-- <label for="psw-repeat"><b>Repeat Password</b></label><br>
	    <input type="password" placeholder="Repeat Password" name="psw-repeat" required id="input"><br><br>-->	
	    <label>
	      <input type="checkbox" checked="checked" name="remember" style=" margin-bottom:10px;"><t style="font-size: 15px;">Remember Me</t>
	    </label>

	    <p style="text-align: center; font-size: 12px;">By creating an account you agree to our <a href="./terms.html" style="color:dodgerblue; font-size: 15px;">Terms & Conditions</a>.</p>
	    <button type="submit" id="btn1">Login</button>
    	<button type="button" id="btn" onclick="closeForm()">Close</button>
    	<hr> 
    	<p style="text-align: center; font-size: 15px;"><u>Sign-Up using Below:</u></p>
    	<a href="#"><img src="sociallogos/yahoo.png" alt="yahoo" id="yahoo"></a>
		<a href="#"><img src="sociallogos/apple.png" alt="x" id="apple"></a>
		<a href="#"><img src="sociallogos/facebook.png" alt="facebook" id="face"></a>
		<a href="#"><img src="sociallogos/google.png" alt="google" id="google"></a>
		<p style="text-align: center; font-size: 14px;"><a href="#"><u style="color:dodgerblue;">Sign-Up by Email</u></a></p>
	</form>
</body>
</html>
